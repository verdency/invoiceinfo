<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thông tin xuất hóa đơn</title>

<style>

body{
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
background:#f3f5f7;
padding:40px 20px;
max-width:720px;
margin:auto;
}

h1{
font-size:28px;
margin-bottom:30px;
}

.item{
background:white;
border-radius:14px;
padding:16px 18px;
margin-bottom:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
display:flex;
justify-content:space-between;
align-items:center;
gap:16px;
}

.text{
flex:1;
}

.label{
font-size:13px;
color:#6b7280;
margin-bottom:4px;
}

.value{
font-size:20px;
font-weight:600;
word-break:break-word;
}

.copy-btn{
background:#2563eb;
border:none;
color:white;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-weight:500;
font-size:14px;
transition:0.2s;
}

.copy-btn:hover{
background:#1d4ed8;
}

.copy-btn.copied{
background:#16a34a;
}

</style>
</head>

<body>

<h1>Thông tin xuất hóa đơn</h1>

<div class="item">
<div class="text">
<div class="label">Tên đơn vị</div>
<div class="value">HỘ KINH DOANH VERDENCY</div>
</div>
<button class="copy-btn" onclick="copy(this,'HỘ KINH DOANH VERDENCY')">Copy</button>
</div>

<div class="item">
<div class="text">
<div class="label">Mã số thuế</div>
<div class="value">079095029505</div>
</div>
<button class="copy-btn" onclick="copy(this,'079095029505')">Copy</button>
</div>

<div class="item">
<div class="text">
<div class="label">Địa chỉ</div>
<div class="value">115/91/18 Lê Văn Sỹ, Phường Phú Nhuận, TP Hồ Chí Minh</div>
</div>
<button class="copy-btn" onclick="copy(this,'115/91/18 Lê Văn Sỹ, Phường Phú Nhuận, TP Hồ Chí Minh')">Copy</button>
</div>

<div class="item">
<div class="text">
<div class="label">Người mua</div>
<div class="value">LÊ TUẤN ANH</div>
</div>
<button class="copy-btn" onclick="copy(this,'LÊ TUẤN ANH')">Copy</button>
</div>

<div class="item">
<div class="text">
<div class="label">Điện thoại</div>
<div class="value">0904506600</div>
</div>
<button class="copy-btn" onclick="copy(this,'0904506600')">Copy</button>
</div>

<div class="item">
<div class="text">
<div class="label">Căn cước công dân</div>
<div class="value">079095029505</div>
</div>
<button class="copy-btn" onclick="copy(this,'079095029505')">Copy</button>
</div>

<script>

function copy(button,text){

navigator.clipboard.writeText(text);

button.classList.add("copied")
button.innerText="✓ Copied"

setTimeout(()=>{
button.classList.remove("copied")
button.innerText="Copy"
},1200)

}

</script>

</body>
</html>

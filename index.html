<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thông tin xuất hóa đơn</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#f3f4f6;
max-width:720px;
margin:auto;
padding:40px 20px;
}

h1{
font-size:28px;
margin-bottom:10px;
}

.subtitle{
color:#6b7280;
margin-bottom:25px;
}

.copy-all{
background:#16a34a;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
font-weight:600;
margin-bottom:25px;
}

.copy-all:hover{
background:#15803d;
}

.item{
background:white;
border-radius:14px;
padding:16px 18px;
margin-bottom:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
display:flex;
justify-content:space-between;
align-items:center;
gap:16px;
cursor:pointer;
}

.text{
flex:1;
}

.label{
font-size:13px;
color:#6b7280;
margin-bottom:4px;
}

.value{
font-size:20px;
font-weight:600;
word-break:break-word;
}

.copy-btn{
background:#2563eb;
border:none;
color:white;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-weight:500;
font-size:14px;
}

.copy-btn.copied{
background:#16a34a;
}

</style>
</head>

<body>

<h1>Thông tin xuất hóa đơn</h1>
<div class="subtitle">Seleen.me / Verdency</div>

<button class="copy-all" onclick="copyAll()">Copy toàn bộ thông tin</button>

<div class="item" onclick="copyLine(this,'HỘ KINH DOANH VERDENCY')">
<div class="text">
<div class="label">Tên đơn vị</div>
<div class="value">HỘ KINH DOANH VERDENCY</div>
</div>
<button class="copy-btn">Copy</button>
</div>

<div class="item" onclick="copyLine(this,'079095029505')">
<div class="text">
<div class="label">Mã số thuế</div>
<div class="value">079095029505</div>
</div>
<button class="copy-btn">Copy</button>
</div>

<div class="item" onclick="copyLine(this,'invoice@verdency.com')">
<div class="text">
<div class="label">Email nhận hóa đơn</div>
<div class="value">invoice@verdency.com</div>
</div>
<button class="copy-btn">Copy</button>
</div>

<div class="item" onclick="copyLine(this,'115/91/18 Lê Văn Sỹ, Phường Phú Nhuận, TP Hồ Chí Minh, Việt Nam')">
<div class="text">
<div class="label">Địa chỉ</div>
<div class="value">115/91/18 Lê Văn Sỹ, Phường Phú Nhuận, TP Hồ Chí Minh</div>
</div>
<button class="copy-btn">Copy</button>
</div>

<div class="item" onclick="copyLine(this,'LÊ TUẤN ANH')">
<div class="text">
<div class="label">Người mua hàng</div>
<div class="value">LÊ TUẤN ANH</div>
</div>
<button class="copy-btn">Copy</button>
</div>

<div class="item" onclick="copyLine(this,'0904506600')">
<div class="text">
<div class="label">Điện thoại</div>
<div class="value">0904506600</div>
</div>
<button class="copy-btn">Copy</button>
</div>

<div class="item" onclick="copyLine(this,'079095029505')">
<div class="text">
<div class="label">Căn cước công dân</div>
<div class="value">079095029505</div>
</div>
<button class="copy-btn">Copy</button>
</div>

<script>

function copyLine(element,text){

navigator.clipboard.writeText(text)

let btn=element.querySelector(".copy-btn")

btn.classList.add("copied")
btn.innerText="✓ Copied"

setTimeout(()=>{
btn.classList.remove("copied")
btn.innerText="Copy"
},1200)

}

function copyAll(){

let text=
`HỘ KINH DOANH VERDENCY
MST: 079095029505
Email: invoice@verdency.com
Địa chỉ: 115/91/18 Lê Văn Sỹ, Phường Phú Nhuận, TP Hồ Chí Minh
Người mua: LÊ TUẤN ANH
Điện thoại: 0904506600
CCCD: 079095029505`

navigator.clipboard.writeText(text)

}

</script>

</body>
</html>
